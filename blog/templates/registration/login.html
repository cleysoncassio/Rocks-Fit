{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Rocks-Fit Gestão</title>
    <link rel="shortcut icon" href="{% static 'images/rks01.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #FF7A00;
            --accent: #4ade80;
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #fff;
        }

        /* Fundo Animado */
        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 122, 0, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(74, 222, 128, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 50px 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-area h1 {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1px;
        }

        .logo-area span { color: var(--primary); }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0,0,0,0.5);
            box-shadow: 0 0 15px rgba(255, 122, 0, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), #e66e00);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 122, 0, 0.4);
            filter: brightness(1.1);
        }

        .links {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
        }

        .links a {
            color: var(--accent);
            text-decoration: none;
            transition: 0.3s;
            font-weight: 600;
        }

        .links a:hover { text-decoration: underline; }

        .errorlist {
            list-style: none;
            padding: 15px;
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid #ff4d4d;
            border-radius: 12px;
            color: #ff4d4d;
            margin-bottom: 25px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    
    <div class="login-card">
        <div class="logo-area">
            <h1>Rocks-<span>Fit</span></h1>
            <p style="color: rgba(255,255,255,0.5); margin-top: 5px;">Acesso ao Sistema de Gestão</p>
        </div>

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="errorlist">
                    <i class="fas fa-exclamation-circle"></i> Usuário ou senha incorretos.
                </div>
            {% endif %}

            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="text" name="username" placeholder="Seu usuário ou e-mail" required autofocus>
            </div>

            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Sua senha" required>
            </div>

            <button type="submit">Entrar no Sistema</button>

            <div class="links">
                <a href="{% url 'password_reset' %}">Esqueceu sua senha?</a>
                <br><br>
                <a href="{% url 'home' %}" style="color: rgba(255,255,255,0.4);">← Voltar para o site</a>
            </div>
        </form>
    </div>
</body>
</html>
