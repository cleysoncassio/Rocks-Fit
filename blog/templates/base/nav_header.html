{% load static %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    /* Estilos Críticos para o Botão Flutuante de Ferramentas */
    .tools-float {
        position: fixed;
        width: 60px;
        height: 60px;
        bottom: 185px !important;
        right: 30px !important;
        left: auto !important;
        background-color: #FF7A00;
        color: #000 !important;
        border-radius: 50%;
        text-align: center;
        font-size: 28px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        z-index: 100000;
        display: flex !important;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        transition: all 0.3s ease;
        animation: pulse-tools 2s infinite;
        cursor: pointer;
    }
    @media screen and (max-width: 768px) {
        .tools-float {
            bottom: 240px !important;
            width: 50px;
            height: 50px;
            font-size: 22px;
        }
    }
    .tools-float:hover {
        transform: scale(1.1);
        background-color: #fff;
        box-shadow: 0 6px 15px rgba(255,122,0,0.5);
    }
    @keyframes pulse-tools {
        0% { box-shadow: 0 0 0 0 rgba(255, 122, 0, 0.7); }
        70% { box-shadow: 0 0 0 15px rgba(255, 122, 0, 0); }
        100% { box-shadow: 0 0 0 0 rgba(255, 122, 0, 0); }
    }
</style>
<div id="fh5co-header">
    <header id="fh5co-header-section">
        <div class="container">
            <div class="nav-header">
                <a href="#" class="js-fh5co-nav-toggle fh5co-nav-toggle"><i></i></a>
                <h1 id="fh5co-logo"><a href="{% url 'home' %}">Rocks-<span>Fit</span></a></h1>
                <!-- START #fh5co-menu-wrap -->
                <nav id="fh5co-menu-wrap" role="navigation">
                    <ul class="sf-menu" id="fh5co-primary-menu">
                        <li class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                            <a href="{% url 'home' %}">Início</a>
                        </li>
                        <li class="{% if request.resolver_match.url_name == 'programs' %}active{% endif %}">
                            <a href="{% url 'programs' %}">Nossos Planos</a>
                        </li>
                        <li class="{% if request.resolver_match.url_name == 'schedule' %}active{% endif %}">
                            <a href="{% url 'schedule' %}">Modalidades</a>
                        </li>
                        <li class="{% if request.resolver_match.url_name == 'trainers' %}active{% endif %}">
                            <a href="{% url 'trainers' %}">Professores</a>
                        </li>
                        <li class="{% if request.resolver_match.url_name == 'about' %}active{% endif %}">
                            <a href="{% url 'about' %}">Sobre nós</a>
                        </li>
                        <li class="{% if request.resolver_match.url_name == 'tools' %}active{% endif %}">
                            <a href="{% url 'tools' %}">Ferramentas Grátis</a>
                        </li>
                        <li class="login-item" style="margin-left: 20px;">
                            {% if user.is_authenticated %}
                                <a href="{% url 'crm_dashboard' %}" class="btn-login-header" style="color: rgba(255,255,255,0.6) !important; font-weight: 500 !important; font-size: 14px; transition: 0.3s; display: inline-flex; align-items: center; gap: 6px;">
                                    <i class="fa-solid fa-gauge-high"></i> Gestão
                                </a>
                            {% else %}
                                <a href="{% url 'login' %}" class="btn-login-header" style="color: rgba(255,255,255,0.4) !important; font-weight: 500 !important; font-size: 14px; transition: 0.3s; display: inline-flex; align-items: center; gap: 6px;">
                                    <i class="fa-solid fa-lock" style="font-size: 12px;"></i> Acesso
                                </a>
                            {% endif %}
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>		
</div>
<!-- end:fh5co-header -->
