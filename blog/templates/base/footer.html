<script>
    $(document).ready(function() {
        var currentPath = window.location.pathname;
        $('.mobile-nav a').each(function() {
            if ($(this).attr('href') === currentPath) {
                $(this).addClass('active');
            } else {
                $(this).removeClass('active');
            }
        });
    });
</script>

<!-- Bottom Nav for Mobile -->
<nav class="mobile-nav">
    <a href="{% url 'home' %}" class="nav-item">
        <i class="icon-home2"></i>
        <span>Início</span>
    </a>
    <a href="{% url 'programs' %}" class="nav-item">
        <i class="icon-calendar2"></i>
        <span>Planos</span>
    </a>
    <a href="{% url 'tools' %}" class="nav-item">
        <i class="fa-solid fa-dumbbell"></i>
        <span>Ferramentas</span>
    </a>
</nav>

<!-- Floating Buttons -->
<a href="https://maps.app.goo.gl/xcdf4qc962zJoX4UA" class="location-float" target="_blank" title="Veja nossa localização">
    <i class="icon-map-marker"></i>
</a>

<a href="https://wa.me/5584999470586" class="whatsapp-float" target="_blank" title="Fale conosco no WhatsApp">
    <i class="icon-whatsapp"></i>
</a>

<!-- Floating Share Button -->
<a href="javascript:void(0);" onclick="shareSite()" class="share-float" title="Compartilhar Ferramentas Fitness">
    <i class="icon-share"></i>
</a>

<script>
    function shareSite() {
        const siteUrl = window.location.origin + "{% url 'tools' %}";
        if (navigator.share) {
            navigator.share({
                title: 'Ferramentas Fitness - Rocks-Fit',
                text: 'Confira as melhores ferramentas fitness da Rocks-Fit para alcançar sua melhor versão:',
                url: siteUrl
            }).catch(err => console.log('Erro ao compartilhar:', err));
        } else {
            const el = document.createElement('textarea');
            el.value = `Ferramentas Fitness - Rocks-Fit! 🚀\nLink: ${siteUrl}`;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert('✅ Link copiado! Compartilhe as ferramentas fitness com seus amigos.');
        }
    }
</script>
