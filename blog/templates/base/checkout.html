{% load static %}
<!DOCTYPE html>
<html class="no-js">
	<head>
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<title>Rocks-Fit - Checkout</title>
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
		<meta name="description" content="Academia Rocks Fit - Checkout" />
		<meta name="author" content="Cleyson Cassio" />

		<link href='https://fonts.googleapis.com/css?family=Roboto:400,100,300,700,900' rel='stylesheet' type='text/css'>
		
		<!-- Animate.css -->
		<link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
		<link rel="stylesheet" href="{% static 'css/animate.css' %}">
		<!-- Icomoon Icon Fonts -->
		<link rel="stylesheet" href="{% static 'css/icomoon.css' %}">
		<!-- Bootstrap -->
		<link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
		<!-- Superfish -->
		<link rel="stylesheet" href="{% static 'css/superfish.css' %}">
		<!-- Custom Style -->
		<link rel="stylesheet" href="{% static 'css/style.css' %}?v=20260405">
		<!-- Checkout Responsive Styles -->
		<style>
			.checkout-form-card {
				background: #1a1a2e;
				border-radius: 16px;
				padding: 35px 30px;
				margin: 40px auto;
				max-width: 700px;
				box-shadow: 0 8px 32px rgba(0,0,0,0.3);
				position: relative;
				z-index: 5; /* Garante que está acima de fundos/parallax */
			}
			.checkout-form-card h3 {
				color: #fff;
				font-weight: 700;
				margin-bottom: 25px;
				font-size: 1.5em;
			}
			.checkout-form-card label {
				color: #ccc;
				font-weight: 600;
				margin-bottom: 5px;
				display: block;
				cursor: pointer;
			}
			.checkout-form-card .form-control {
				background: #16213e;
				border: 1px solid #333;
				color: #fff;
				border-radius: 8px;
				padding: 12px 15px;
				font-size: 16px !important; /* Mínimo 16px para evitar zoom no iOS */
				transition: border-color 0.3s;
				-webkit-user-select: text !important; /* Garante que possa ser selecionado/focado no iOS */
				user-select: text !important;
			}
			.checkout-form-card .form-control:focus {
				border-color: #f97316;
				box-shadow: 0 0 0 2px rgba(249,115,22,0.2);
				outline: none;
			}
			.checkout-form-card .form-control::placeholder {
				color: #666;
			}
			.checkout-form-card .help-block {
				color: #888;
			}
			.checkout-form-card hr {
				border-color: #333;
				margin: 25px 0;
			}
			.checkout-field-row {
				display: flex;
				gap: 20px;
				margin-bottom: 20px;
			}
			.checkout-field-row .checkout-field {
				flex: 1;
				min-width: 0;
			}
			@media (max-width: 600px) {
				.checkout-field-row {
					flex-direction: column;
					gap: 15px;
				}
				.checkout-form-card {
					padding: 25px 18px;
					margin: 20px 10px;
					border-radius: 12px;
				}
				.checkout-form-card h3 {
					font-size: 1.25em;
				}
			}
			.btn-checkout-pay {
				padding: 15px 30px;
				width: 100%;
				margin-bottom: 10px;
				font-weight: 700;
				font-size: 16px;
				border-radius: 10px;
				border: none;
				cursor: pointer;
				transition: transform 0.15s, box-shadow 0.15s;
			}
			.btn-checkout-pay:hover {
				transform: translateY(-2px);
				box-shadow: 0 4px 16px rgba(0,0,0,0.3);
			}
			.btn-checkout-pay.btn-infinitepay {
				background: linear-gradient(135deg, #f97316, #ea580c);
				color: #fff;
			}
			.btn-checkout-pay.btn-pix-whatsapp {
				background: linear-gradient(135deg, #25d366, #128c4e);
				color: #fff;
			}
		</style>

		<!-- Modernizr JS -->
		<script src="{% static 'js/modernizr-2.6.2.min.js' %}"></script>
	</head>
	<body>
		<div id="fh5co-wrapper">
		<div id="fh5co-page">
		{% include 'base/nav_header.html' %}

		<div class="fh5co-parallax" style="background-image: url('{% static 'images/rks1.jpeg' %}'); height: 300px; min-height: 300px;">
			<div class="overlay"></div>
			<div class="container">
				<div class="row">
					<div class="col-md-8 col-md-offset-2 col-sm-12 col-sm-offset-0 col-xs-12 col-xs-offset-0 text-center fh5co-table" style="height: 300px;">
						<div class="fh5co-intro fh5co-table-cell animate-box">
							<h1 class="text-center">Finalizar Cadastro</h1>
							<p>Plano Selecionado: <strong>{{ plan.name }}</strong> (R$ {{ plan.price }})</p>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div id="fh5co-contact">
			<div class="container">
				<div class="row">
					<div class="col-xs-12">
						<div class="checkout-form-card animate-box">
						<form id="checkout-form">
							<h3>Dados do Aluno</h3>

							<div class="checkout-field-row">
								<div class="checkout-field">
									<label for="nome_completo">Nome Completo</label>
									<input type="text" id="nome_completo" class="form-control" name="nome_completo" placeholder="Seu nome completo" required autocomplete="name">
								</div>
								<div class="checkout-field">
									<label for="cpf">CPF (Somente Números)</label>
									<input type="text" id="cpf" class="form-control" name="cpf" placeholder="000.000.000-00" required maxlength="14" inputmode="numeric" autocomplete="off">
								</div>
							</div>

							<div class="checkout-field-row">
								<div class="checkout-field">
									<label for="email">E-mail</label>
									<input type="email" id="email" class="form-control" name="email" placeholder="exemplo@email.com" required autocomplete="email">
								</div>
								<div class="checkout-field">
									<label for="whatsapp">WhatsApp (DDD + Número)</label>
									<input type="text" id="whatsapp" class="form-control" name="whatsapp" placeholder="(84) 99999-9999" required maxlength="15" inputmode="tel" autocomplete="tel">
								</div>
							</div>

							<div class="checkout-field-row">
								<div class="checkout-field">
									<label for="data_nascimento">Data de Nascimento</label>
									<input type="text" id="data_nascimento" class="form-control" name="data_nascimento" placeholder="DD/MM/AAAA" required maxlength="10" inputmode="numeric" autocomplete="bday">
									<p class="help-block"><small>Digite apenas números. Ex: 16061980 → 16/06/1980</small></p>
								</div>
							</div>

							<hr>

							<input type="hidden" id="payment_method" value="infinitepay">

							<div id="checkout-messages" class="alert alert-danger" style="display:none;"></div>

							<div class="form-group text-center">
								<button type="button" id="btn-pagar" class="btn-checkout-pay btn-infinitepay">{% if plan.button1_text %}{{ plan.button1_text }}{% else %}Pagar Agora via Cartão (InfinityPay) - R$ {{ plan.price }}{% endif %}</button>
								<button type="button" id="btn-pix" class="btn-checkout-pay btn-pix-whatsapp">{% if plan.button2_text %}{{ plan.button2_text }}{% else %}Pagar no PIX (WhatsApp) - R$ {{ plan.price }}{% endif %}</button>
							</div>

						</form>
						</div>
					</div>
				</div>
			</div>
		</div>

		{% include 'base/footer.html' %}

		</div>
		</div>

		<!-- jQuery -->
		<script src="{% static 'js/jquery.min.js' %}"></script>
		<script src="{% static 'js/jquery.easing.1.3.js' %}"></script>
		<script src="{% static 'js/bootstrap.min.js' %}"></script>
		<script src="{% static 'js/jquery.waypoints.min.js' %}"></script>
		<script src="{% static 'js/jquery.stellar.min.js' %}"></script>
		<script src="{% static 'js/hoverIntent.js' %}"></script>
		<script src="{% static 'js/superfish.js' %}"></script>
		<script src="{% static 'js/main.js' %}"></script>

		<script>
		document.addEventListener('DOMContentLoaded', function() {
			const PIX_KEY = "{{ site_config.pix_key|default:'' }}";

			// === MÁSCARA DE CPF 000.000.000-00 ===
			const cpfInput = document.getElementById('cpf');

			cpfInput.addEventListener('input', function(e) {
				let digits = this.value.replace(/\D/g, '');
				if (digits.length > 11) {
					digits = digits.substring(0, 11);
				}

				let formatted = '';
				if (digits.length > 0) {
					formatted = digits.substring(0, Math.min(3, digits.length));
				}
				if (digits.length > 3) {
					formatted += '.' + digits.substring(3, Math.min(6, digits.length));
				}
				if (digits.length > 6) {
					formatted += '.' + digits.substring(6, Math.min(9, digits.length));
				}
				if (digits.length > 9) {
					formatted += '-' + digits.substring(9, 11);
				}

				this.value = formatted;
			});

			cpfInput.addEventListener('keypress', function(e) {
				const char = String.fromCharCode(e.which || e.keyCode);
				if (!/\d/.test(char) && e.which !== 8 && e.which !== 0) {
					e.preventDefault();
				}
			});

			// === MÁSCARA DE TELEFONE (84) 99999-9999 ===
			const whatsInput = document.getElementById('whatsapp');

			whatsInput.addEventListener('input', function(e) {
				let digits = this.value.replace(/\D/g, '');
				if (digits.length > 11) {
					digits = digits.substring(0, 11);
				}

				let formatted = '';
				if (digits.length > 0) {
					formatted = '(' + digits.substring(0, Math.min(2, digits.length));
				}
				if (digits.length > 2) {
					formatted += ') ' + digits.substring(2, Math.min(7, digits.length));
				}
				if (digits.length > 7) {
					formatted += '-' + digits.substring(7, 11);
				}

				this.value = formatted;
			});

			whatsInput.addEventListener('keypress', function(e) {
				const char = String.fromCharCode(e.which || e.keyCode);
				if (!/\d/.test(char) && e.which !== 8 && e.which !== 0) {
					e.preventDefault();
				}
			});

			// === MÁSCARA DE DATA DD/MM/AAAA ===
			const dataInput = document.getElementById('data_nascimento');

			dataInput.addEventListener('input', function(e) {
				// Pegar apenas dígitos do valor atual
				let digits = this.value.replace(/\D/g, '');

				// Limitar a 8 dígitos (DDMMAAAA)
				if (digits.length > 8) {
					digits = digits.substring(0, 8);
				}

				// Montar a string formatada
				let formatted = '';
				if (digits.length > 0) {
					formatted = digits.substring(0, Math.min(2, digits.length));
				}
				if (digits.length > 2) {
					formatted += '/' + digits.substring(2, Math.min(4, digits.length));
				}
				if (digits.length > 4) {
					formatted += '/' + digits.substring(4, 8);
				}

				this.value = formatted;
			});

			// Impedir caracteres não numéricos (exceto barra que é inserida automaticamente)
			dataInput.addEventListener('keypress', function(e) {
				const char = String.fromCharCode(e.which || e.keyCode);
				if (!/\d/.test(char) && e.which !== 8 && e.which !== 0) {
					e.preventDefault();
				}
			});

			// Função para converter DD/MM/AAAA ou DD/MM/AA para YYYY-MM-DD
			function convertDateToISO(dateStr) {
				const parts = dateStr.split('/');
				if (parts.length !== 3) return '';

				let day = parts[0].padStart(2, '0');
				let month = parts[1].padStart(2, '0');
				let year = parts[2];

				// Se o ano tem 2 dígitos, converter para 4
				if (year.length === 2) {
					const currentYear = new Date().getFullYear();
					const cutoff = currentYear - 2000;
					if (parseInt(year) <= cutoff) {
						year = '20' + year;
					} else {
						year = '19' + year;
					}
				}

				return year + '-' + month + '-' + day;
			}

			// === LÓGICA DE PAGAMENTO ===
			const btnPagar = document.getElementById('btn-pagar');
			const btnPix = document.getElementById('btn-pix');
			const form = document.getElementById('checkout-form');
			const messages = document.getElementById('checkout-messages');

			function validateForm() {
				// Validação padrão do formulário
				if (!form.checkValidity()) return false;

				// Validar data manualmente
				const dateVal = dataInput.value;
				const dateDigits = dateVal.replace(/\D/g, '');
				if (dateDigits.length < 6) {
					messages.innerText = "Por favor, informe a data de nascimento completa (DD/MM/AAAA).";
					messages.style.display = 'block';
					dataInput.focus();
					return false;
				}
				return true;
			}

			btnPagar.addEventListener('click', function(e) {
				handlePayment(e, 'infinitepay', btnPagar);
			});

			btnPix.addEventListener('click', function(e) {
				handlePayment(e, 'local', btnPix);
			});

			function handlePayment(e, method, btn) {
				e.preventDefault();
				if (!validateForm()) {
					form.reportValidity();
					return;
				}

				btnPagar.disabled = true;
				btnPix.disabled = true;
				btn.innerText = "Processando Cadastro...";
				messages.style.display = 'none';

				// Converter data para ISO antes de enviar
				const dataISO = convertDateToISO(dataInput.value);

				const formData = new FormData();
				formData.append('plan_id', "{{ plan.id }}");
				formData.append('nome_completo', document.getElementById('nome_completo').value);
				formData.append('cpf', document.getElementById('cpf').value);
				formData.append('email', document.getElementById('email').value);
				formData.append('whatsapp', document.getElementById('whatsapp').value);
				formData.append('data_nascimento', dataISO);
				formData.append('payment_method', method);

				fetch('/api/process-payment/', {
					method: 'POST',
					body: formData
				})
				.then(response => response.json())
				.then(data => {
					if (data.success && data.action === 'redirect') {
						if (method === 'local' && PIX_KEY) {
							// Tentar copiar para o clipboard antes de redirecionar
							const copyToClipboard = (text) => {
								if (navigator.clipboard && navigator.clipboard.writeText) {
									return navigator.clipboard.writeText(text);
								} else {
									const textArea = document.createElement("textarea");
									textArea.value = text;
									document.body.appendChild(textArea);
									textArea.select();
									try {
										document.execCommand('copy');
									} catch (err) {}
									document.body.removeChild(textArea);
									return Promise.resolve();
								}
							};

							copyToClipboard(PIX_KEY).finally(() => {
								btn.innerText = "Chave Copiada! Redirecionando...";
								setTimeout(() => {
									window.location.href = data.url;
								}, 800);
							});
						} else {
							btn.innerText = "Redirecionando...";
							window.location.href = data.url;
						}
					} else {
						messages.innerText = "Erro: " + data.error;
						messages.style.display = 'block';
						btnPagar.disabled = false;
						btnPix.disabled = false;
						btnPagar.innerText = "{% if plan.button1_text %}{{ plan.button1_text|escapejs }}{% else %}Pagar Agora via Cartão (InfinityPay) - R$ {{ plan.price }}{% endif %}";
						btnPix.innerText = "{% if plan.button2_text %}{{ plan.button2_text|escapejs }}{% else %}Pagar no PIX (WhatsApp) - R$ {{ plan.price }}{% endif %}";
					}
				})
				.catch(err => {
					messages.innerText = "Erro ao conectar com o servidor.";
					messages.style.display = 'block';
					btnPagar.disabled = false;
					btnPix.disabled = false;
				});
			}
		});
		</script>

		<!-- WhatsApp Floating Button -->
		<a href="https://wa.me/5584999470586" class="whatsapp-float" target="_blank" title="Fale conosco no WhatsApp">
			<i class="icon-whatsapp"></i>
		</a>

	</body>
</html>
