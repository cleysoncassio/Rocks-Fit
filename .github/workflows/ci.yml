name: Rocks-Fit CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rocksfit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/rocksfit_test
          SECRET_KEY: ci-test-secret-key-rocks-fit-2026
          DEBUG: 'True'
          WHITENOISE_MANIFEST_STRICT: 'False'
        run: |
          python manage.py migrate --noinput

      - name: Collect static files
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/rocksfit_test
          SECRET_KEY: ci-test-secret-key-rocks-fit-2026
          DEBUG: 'True'
          WHITENOISE_MANIFEST_STRICT: 'False'
        run: |
          python manage.py collectstatic --noinput || true

      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/rocksfit_test
          SECRET_KEY: ci-test-secret-key-rocks-fit-2026
          DEBUG: 'True'
          WHITENOISE_MANIFEST_STRICT: 'False'
        run: |
          python manage.py test --noinput
