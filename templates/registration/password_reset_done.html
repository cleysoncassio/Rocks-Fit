{% extends "base/base.html" %}
{% block title %}E-mail Enviado - Rocks Fit{% endblock %}
{% block content %}
<div class="login-page d-flex align-items-center justify-content-center min-vh-100 p-3">
    <div class="container text-center">
        <div class="login-card p-5 mx-auto" style="max-width: 500px;">
            <div class="mb-4">
                <i class="bi bi-envelope-check text-orange display-1"></i>
            </div>
            <h2 class="space-font fw-bold text-white mb-3">E-MAIL ENVIADO</h2>
            <p class="text-secondary mb-4">Enviamos um link de recuperação para o endereço informado. Verifique sua caixa de entrada e spam.</p>
            <a href="{% url 'login' %}" class="btn btn-rocks-primary w-100 py-3 fw-bold">VOLTAR AO LOGIN</a>
        </div>
    </div>
</div>
<style>
    .login-page { background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); }
    .login-card { background: rgba(18, 18, 18, 0.9); border: 1px solid #333; border-top: 3px solid #f27121; border-radius: 20px; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
    .btn-rocks-primary { background: #f27121; color: #000; border-radius: 10px; border: none; }
</style>
{% endblock %}
