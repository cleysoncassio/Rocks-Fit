{% extends "base/base.html" %}

{% block title %}Recuperar Senha - Rocks Fit{% endblock %}

{% block content %}
<div class="login-page d-flex align-items-center justify-content-center min-vh-100 p-3">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8">
                <div class="login-card p-5">
                    <div class="text-center mb-5">
                        <h2 class="space-font fw-bold text-orange">RECUPERAR ACESSO</h2>
                        <p class="text-secondary small">Insira seu e-mail para receber as instruções.</p>
                        <div class="orange-divider mx-auto mt-2"></div>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="rocks-label mb-2">E-MAIL CADASTRADO</label>
                            <input type="email" name="email" class="form-control form-control-rocks" placeholder="seu@email.com" required>
                        </div>

                        <button type="submit" class="btn btn-rocks-primary w-100 mb-4 py-3 fw-bold">
                            ENVIAR LINK DE RECUPERAÇÃO
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="{% url 'login' %}" class="text-secondary small text-decoration-none hover-orange">
                            <i class="bi bi-arrow-left me-2"></i>Voltar para o Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .login-page { background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); }
    .login-card { background: rgba(18, 18, 18, 0.9); border: 1px solid #333; border-top: 3px solid #f27121; border-radius: 20px; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
    .rocks-label { font-size: 0.75rem; font-weight: 700; color: #888; letter-spacing: 1px; }
    .btn-rocks-primary { background: #f27121; color: #000; border-radius: 10px; border: none; }
    .btn-rocks-primary:hover { background: #fff; transform: translateY(-2px); }
    .hover-orange:hover { color: #f27121 !important; transition: 0.3s; }
    .orange-divider { width: 40px; height: 4px; background: #f27121; }
</style>
{% endblock %}
