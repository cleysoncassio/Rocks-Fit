<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção Pesada - Rocks-Fit Academia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@500;700&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            color: #d4d4d4;
            font-family: 'Teko', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-transform: uppercase;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 50px 40px;
            background: linear-gradient(135deg, #1c1c1c 0%, #0d0d0d 100%);
            border: 2px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255, 215, 0, 0.05);
            max-width: 600px;
            width: 90%;
        }

        .stripes-top, .stripes-bottom {
            position: absolute;
            left: 0;
            width: 100%;
            height: 15px;
            background: repeating-linear-gradient(
                45deg,
                #ffd700,
                #ffd700 15px,
                #111 15px,
                #111 30px
            );
        }
        
        .stripes-top { top: 0; border-bottom: 2px solid #333; }
        .stripes-bottom { bottom: 0; border-top: 2px solid #333; }

        h1 {
            font-size: 6rem;
            margin: 0;
            color: #ffd700;
            text-shadow: 3px 3px 0px #000, -1px -1px 0px #000, 0 0 20px rgba(255, 215, 0, 0.4);
            line-height: 1;
        }

        h2 {
            font-size: 2.5rem;
            margin: 10px 0 20px;
            letter-spacing: 2px;
            color: #fff;
        }

        p {
            font-family: 'Arial', sans-serif;
            font-size: 1.1rem;
            text-transform: none;
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .icon-container {
            margin: 20px 0 30px;
            position: relative;
            display: inline-block;
        }

        .gear {
            width: 140px;
            height: 140px;
            animation: spin 8s linear infinite;
            fill: #333;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }

        .dumbbell {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            fill: #ffd700;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3));
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .btn {
            display: inline-block;
            padding: 12px 35px;
            font-size: 1.5rem;
            color: #111;
            background-color: #ffd700;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
            border: 2px solid #ffd700;
            cursor: pointer;
        }

        .btn:hover {
            background-color: transparent;
            color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .error-code {
            position: absolute;
            top: -40px;
            right: -20px;
            font-size: 12rem;
            color: rgba(255, 255, 255, 0.02);
            z-index: -1;
            font-weight: bold;
            pointer-events: none;
            user-select: none;
        }
        
        .alert-box {
            display: inline-block;
            background-color: rgba(255, 215, 0, 0.1);
            border-left: 4px solid #ffd700;
            padding: 10px 20px;
            margin-bottom: 25px;
            font-family: 'Arial', sans-serif;
            text-transform: none;
            color: #ffd700;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="stripes-top"></div>
        <div class="error-code">500</div>
        
        <div class="icon-container">
            <svg class="gear" viewBox="0 0 24 24">
                <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
            </svg>
            <svg class="dumbbell" viewBox="0 0 24 24">
                <path d="M20.57,14.86L22,13.43L20.57,12L17,15.57L8.43,7L12,3.43L10.57,2L9.14,3.43L7.71,2L5.57,4.14L4.14,2.71L2.71,4.14 L4.14,5.57L2,7.71L3.43,9.14L2,10.57L3.43,12L7,8.43L15.57,17L12,20.57L13.43,22L14.86,20.57L16.29,22L18.43,19.86L19.86,21.29 L21.29,19.86L19.86,18.43L22,16.29L20.57,14.86z"/>
            </svg>
        </div>

        <h1>ERRO 500</h1>
        <h2>Manutenção Pesada</h2>
        
        <div class="alert-box">
            Atenção: Nossos servidores atingiram a falha muscular.
        </div>
        
        <p>A página que você tentou acessar quebrou e nossa equipe de infraestrutura já está ajustando os parafusos e levantando o peso para consertar. Tente novamente em alguns instantes!</p>
        
        <a href="/" class="btn">Voltar para a Home</a>

        <div class="stripes-bottom"></div>
    </div>

</body>
</html>
